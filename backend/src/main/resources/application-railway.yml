spring:
  config:
    activate:
      on-profile: railway

  datasource:
    url: ${RAILWAY_DATABASE_URL}
    username: ${RAILWAY_DB_USER}
    password: ${RAILWAY_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

server:
  port: ${PORT:8080}

logging:
  level:
    com.ims.backend: INFO
    org.springframework.web: INFO
