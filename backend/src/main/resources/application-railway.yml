spring:
  config:
    activate:
      on-profile: railway
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
server:
  # 监听端口：优先使用云平台注入的 ${PORT} 环境变量（如 Railway 分配的动态端口）；
  # 若本地运行无此变量，则自动降级使用默认值 8080。
  port: ${PORT:8080}
logging:
  level:
    com.ims.backend: INFO
    org.springframework.web: INFO