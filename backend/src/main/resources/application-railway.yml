spring:
  config:
    activate:
      on-profile: railway
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
server:
  port: ${PORT:8080}
logging:
  level:
    com.ims.backend: INFO
    org.springframework.web: INFO